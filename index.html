  <main>

<script>
// 🔥 CONFIGURACIÓN DE FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCMK5io8l1BItL_xdKfTnADJoAw8A1CBwU",
  authDomain: "cumples-escolares.firebaseapp.com",
  projectId: "cumples-escolares",
  storageBucket: "cumples-escolares.firebasestorage.app",
  messagingSenderId: "1097916597306",
  appId: "1:1097916597306:web:c0017dbfacc7669010e103"
};

firebase.initializeApp(firebaseConfig);

// App Check
const appCheck = firebase.appCheck();
appCheck.activate(
  '6LeKT30sAAAAAIDMbwRGcxRD0_jIqmxGG9q30gDY',
  true
);

const db = firebase.firestore();
const storage = firebase.storage();
const auth = firebase.auth();

// Variables globales
let parents = [];
let birthdays = [];
let birthdayFiles = {};
let currentUser = null; // { id, name, email, role, ... }

const COLORS = ['#1E88E5','#42A5F5','#1976D2','#0D47A1','#64B5F6','#1565C0','#82B1FF','#2962FF'];
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// Utilidades
function colorFor(name) {
  let h = 0;
  for(let c of name) h = (h*31 + c.charCodeAt(0)) & 0xFFFFFF;
  return COLORS[Math.abs(h) % COLORS.length];
}
function initials(name) {
  return name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
}

// ─── LOGS Y AUDITORÍA (igual que antes) ─────────────────
async function logAudit(action, details = {}) {
  if (!currentUser) return;
  const logEntry = {
    userId: currentUser.id,
    userName: currentUser.name,
    action: action,
    details: details,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  };
  try {
    await db.collection('audit_logs').add(logEntry);
  } catch (error) {
    console.error('Error al guardar log:', error);
  }
}

async function logLogin() {
  if (!currentUser) return;
  const logEntry = {
    userId: currentUser.id,
    userName: currentUser.name,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  };
  try {
    await db.collection('login_logs').add(logEntry);
  } catch (error) {
    console.error('Error al guardar login:', error);
  }
}

async function loadAuditLogs() {
  if (!currentUser || currentUser.role !== 'admin') return;
  const container = document.getElementById('audit-logs');
  container.innerHTML = 'Cargando...';
  try {
    const snapshot = await db.collection('audit_logs')
      .orderBy('timestamp', 'desc')
      .limit(50)
      .get();
    if (snapshot.empty) {
      container.innerHTML = '<p class="empty">No hay registros</p>';
      return;
    }
    let html = '';
    snapshot.forEach(doc => {
      const data = doc.data();
      const time = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleString() : 'fecha desconocida';
      html += `<div class="audit-item">
        <span class="audit-user">${data.userName}</span>
        <span class="audit-action">${data.action}</span>
        <div style="font-size:0.8rem;color:var(--muted);">${JSON.stringify(data.details)}</div>
        <div class="audit-time">${time}</div>
      </div>`;
    });
    container.innerHTML = html;
  } catch (error) {
    container.innerHTML = '<p class="empty">Error al cargar</p>';
    console.error(error);
  }
}

// ─── LISTENERS EN TIEMPO REAL ────────────────────────────
function listenToParents() {
  db.collection("parents").onSnapshot((snapshot) => {
    parents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    // Si hay usuario logueado, actualizamos currentUser con datos frescos
    if (currentUser) {
      const updated = parents.find(p => p.id === currentUser.id);
      if (updated) currentUser = updated;
      else logout();
    }
    render();
    // No necesitamos updateLoginSelect porque ahora el login es por email
  }, (error) => console.error("Error al escuchar padres: ", error));
}

function listenToBirthdays() {
  db.collection("birthdays").onSnapshot((snapshot) => {
    birthdays = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    render();
  }, (error) => console.error("Error al escuchar cumpleaños: ", error));
}

function listenToFiles() {
  db.collection("birthday_files").onSnapshot((snapshot) => {
    birthdayFiles = {};
    snapshot.docs.forEach(doc => {
      const file = { id: doc.id, ...doc.data() };
      const bdayId = file.birthdayId;
      if (!birthdayFiles[bdayId]) birthdayFiles[bdayId] = [];
      birthdayFiles[bdayId].push(file);
    });
    render();
  }, (error) => console.error("Error al escuchar archivos:", error));
}

// ─── LOGIN CON FIREBASE AUTH ────────────────────────────
async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) {
    alert('Ingresá email y contraseña');
    return;
  }
  try {
    const userCredential = await auth.signInWithEmailAndPassword(email, password);
    const user = userCredential.user;
    // Buscar el documento del padre en Firestore usando el email
    const parentQuery = await db.collection('parents').where('email', '==', email).get();
    if (parentQuery.empty) {
      // Esto no debería pasar si los usuarios están sincronizados
      alert('Usuario no encontrado en la base de datos');
      await auth.signOut();
      return;
    }
    const parentDoc = parentQuery.docs[0];
    currentUser = { id: parentDoc.id, ...parentDoc.data() };
    
    document.getElementById('login-container').style.display = 'none';
    document.getElementById('app-container').style.display = 'block';
    
    if (currentUser.role !== 'admin') {
      document.getElementById('config-tab').classList.add('hidden');
      document.getElementById('fab').classList.add('hidden');
    } else {
      document.getElementById('config-tab').classList.remove('hidden');
      document.getElementById('fab').classList.remove('hidden');
      loadAuditLogs();
    }
    
    logLogin();
    render();
  } catch (error) {
    alert('Error al iniciar sesión: ' + error.message);
  }
}

function logout() {
  auth.signOut().then(() => {
    currentUser = null;
    document.getElementById('login-container').style.display = 'block';
    document.getElementById('app-container').style.display = 'none';
    document.getElementById('login-password').value = '';
    document.getElementById('login-email').value = '';
  }).catch(error => console.error('Error al cerrar sesión:', error));
}

// Escuchar cambios en el estado de autenticación (por si la sesión expira)
auth.onAuthStateChanged((user) => {
  if (!user && currentUser) {
    // Se cerró la sesión inesperadamente
    logout();
  }
});

// ─── RENDER (igual que antes, pero ahora usa currentUser) ─
function render() {
  if (!currentUser) return;
  renderStats();
  renderUpcoming();
  renderBirthdays();
  renderParents();
  renderUsersList();
  populateSelects();
}

function renderStats() {
  const total = birthdays.length;
  const upcoming = birthdays.filter(b => { const d = getDaysUntil(b.date); return d > 0 && d <= 30; }).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Cumpleaños</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent3)">${upcoming}</div><div class="stat-label">Este mes</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent4)">${parents.length}</div><div class="stat-label">Padres</div></div>
  `;
}

function renderUpcoming() {
  const sorted = [...birthdays]
    .map(b => ({ ...b, days: getDaysUntil(b.date) }))
    .sort((a,b) => a.days - b.days)
    .slice(0, 5);
  if (!sorted.length) {
    document.getElementById('upcoming-list').innerHTML = `<div class="empty"><div class="empty-icon">📅</div><p>Agregá cumpleaños desde la pestaña 🎂</p></div>`;
    return;
  }
  document.getElementById('upcoming-list').innerHTML = sorted.map(b => {
    const badge = getBadge(b.date);
    const recName = b.recaudador ? (parents.find(p=>p.id===b.recaudador)?.name || '—') : 'Sin asignar';
    const total = parents.length;
    const checked = (b.contributors || []).length;
    return `<div class="bday-card" onclick="showTab_cumples(); setTimeout(()=>toggleBody('${b.id}'),100)">
      <div class="bday-header" style="border-left:4px solid ${colorFor(b.name)}">
        <div class="bday-avatar" style="background:${colorFor(b.name)}20;color:${colorFor(b.name)}">${initials(b.name)}</div>
        <div class="bday-info">
          <div class="bday-name">${b.name} ${b.days === 0 ? '<span class="next-badge">¡HOY!</span>' : b.days <= 7 ? '<span class="next-badge">¡Pronto!</span>' : ''}</div>
          <div class="bday-date">${formatDate(b.date)} · 🙋 ${recName} · ✅ ${checked}/${total}</div>
        </div>
        <span class="bday-badge ${badge.cls}">${badge.text}</span>
      </div>
    </div>`;
  }).join('');
}

function showTab_cumples() {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-cumples').classList.add('active');
  document.querySelectorAll('.tab-btn')[1].classList.add('active');
  renderBirthdays();
}

function renderBirthdays() {
  const list = document.getElementById('bday-list');
  const empty = document.getElementById('bday-empty');
  if (!birthdays.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  const sorted = [...birthdays]
    .map(b => ({ ...b, days: getDaysUntil(b.date) }))
    .sort((a,b) => a.days - b.days);
  const byMonth = {};
  sorted.forEach(b => {
    const { month } = parseDate(b.date);
    if (!byMonth[month]) byMonth[month] = [];
    byMonth[month].push(b);
  });
  let html = '';
  for (const month of Object.keys(byMonth).sort((a,b)=>a-b)) {
    html += `<div class="month-header">📅 ${MONTHS[month-1]}</div>`;
    byMonth[month].forEach(b => {
      html += renderBdayCard(b);
    });
  }
  list.innerHTML = html;
}

function renderBdayCard(b) {
  const badge = getBadge(b.date);
  const rec = b.recaudador ? parents.find(p=>p.id===b.recaudador) : null;
  const contributors = b.contributors || [];
  const total = parents.length;
  const pct = total > 0 ? Math.round(contributors.length / total * 100) : 0;

  const contributorsHTML = parents.length ? parents.map(p => {
    const checked = contributors.includes(p.id);
    const isSelf = currentUser && p.id === currentUser.id;
    const canToggle = currentUser.role === 'admin' || (isSelf && !checked);
    const disabledClass = (!canToggle && checked) ? 'disabled' : '';
    return `<div class="contributor-item ${checked?'checked':''} ${disabledClass}" onclick="if(${canToggle}) toggleContributor('${b.id}','${p.id}')">
      <div class="check-box">${checked?'✓':''}</div>
      <span class="contributor-name">${p.name}</span>
    </div>`;
  }).join('') : `<p style="color:var(--muted);font-size:0.85rem">Primero agregá padres en la pestaña 👨‍👩‍👧</p>`;

  const noteText = b.note || '';
  const deleteButton = currentUser.role === 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteBirthday('${b.id}')">🗑️ Eliminar</button>` : '';

  const files = birthdayFiles[b.id] || [];
  const filesHTML = files.map(f => `
    <div class="file-item">
      <div class="file-info">
        <span class="file-icon">${f.fileType?.startsWith('image/') ? '🖼️' : '📄'}</span>
        <a href="${f.url}" target="_blank" class="file-name">${f.fileName}</a>
        <span class="file-size">${(f.fileSize/1024).toFixed(1)} KB</span>
      </div>
      ${currentUser.role === 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteFile('${f.id}','${b.id}')">✕</button>` : ''}
    </div>
  `).join('');

  return `<div class="bday-card" id="bday-${b.id}">
    <div class="bday-header" onclick="toggleBody('${b.id}')" style="border-left:4px solid ${colorFor(b.name)}">
      <div class="bday-avatar" style="background:${colorFor(b.name)}20;color:${colorFor(b.name)}">${initials(b.name)}</div>
      <div class="bday-info">
        <div class="bday-name">${b.name}</div>
        <div class="bday-date">${formatDate(b.date)}</div>
      </div>
      <span class="bday-badge ${badge.cls}">${badge.text}</span>
    </div>
    <div class="bday-body" id="body-${b.id}">
      <div class="recaudador-section">
        <div class="recaudador-label">🙋 Recaudador/a</div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
          <div class="recaudador-name">${rec ? rec.name : '⚠️ Sin asignar'}</div>
          ${currentUser.role === 'admin' ? `<button class="btn btn-warning btn-sm" onclick="openRecModal('${b.id}')">Cambiar</button>` : ''}
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-info">
          <span>✅ Aportaron: ${contributors.length}/${total}</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>

      <div class="contributors-title">👥 ¿Quién aportó?</div>
      <div class="contributors-grid">${contributorsHTML}</div>

      <div class="note-section">
        <div class="contributors-title">📝 Notas</div>
        <div class="note-display ${noteText?'':'empty'}" onclick="openNoteModal('${b.id}')">${noteText || 'Tap para agregar monto, link de pago, etc...'}</div>
      </div>

      <div class="files-section">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div class="contributors-title">📎 Archivos adjuntos</div>
          <button class="btn btn-info btn-sm" onclick="openUploadModal('${b.id}')">➕ Subir archivo</button>
        </div>
        <div class="files-list" id="files-${b.id}">
          ${filesHTML || '<p style="color:var(--muted);">No hay archivos</p>'}
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="shareStatus('${b.id}')">📋 Copiar estado</button>
        ${deleteButton}
      </div>
    </div>
  </div>`;
}

function toggleBody(id) {
  const body = document.getElementById('body-'+id);
  body.classList.toggle('open');
}

function renderParents() {
  const list = document.getElementById('parents-list');
  const empty = document.getElementById('parents-empty');
  if (!parents.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = parents.map(p => `
    <div class="parent-item">
      <div class="parent-info">
        <div class="parent-avatar" style="background:${colorFor(p.name)}">${initials(p.name)}</div>
        <div>
          <div class="parent-name">${p.name} ${p.role === 'admin' ? '👑' : ''}</div>
          <div class="parent-role">${p.childName ? '👦 '+p.childName : ''} ${p.contact ? '· '+p.contact : ''}</div>
        </div>
      </div>
      ${currentUser.role === 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteParent('${p.id}')">✕</button>` : ''}
    </div>
  `).join('');
}

function renderUsersList() {
  if (currentUser.role !== 'admin') return;
  const container = document.getElementById('users-list');
  if (!container) return;
  container.innerHTML = parents.map(p => `
    <div class="parent-item" style="cursor:pointer;" onclick="openEditUserModal('${p.id}')">
      <div>
        <strong>${p.name}</strong> (${p.role})<br>
        <span style="font-size:0.85rem;color:var(--muted)">Email: ${p.email} | Hijo: ${p.childName || '-'} | Contacto: ${p.contact || '-'}</span>
      </div>
      <span style="color:var(--accent)">✏️</span>
    </div>
  `).join('');
}

function populateSelects() {
  const opts = `<option value="">— Sin asignar —</option>` +
    parents.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  document.getElementById('modal-recaudador').innerHTML = opts;
  document.getElementById('rec-select').innerHTML = opts;
}

// ─── FECHAS (igual que antes) ───────────────────────────
function parseDate(str) {
  const [y,m,d] = str.split('-').map(Number);
  return { year: y, month: m, day: d };
}
function getDaysUntil(dateStr) {
  const today = new Date();
  const { month, day } = parseDate(dateStr);
  let next = new Date(today.getFullYear(), month-1, day);
  if (next < today && !(next.getMonth() === today.getMonth() && next.getDate() === today.getDate())) {
    next = new Date(today.getFullYear()+1, month-1, day);
  }
  const diff = Math.floor((next - today) / 86400000);
  return diff;
}
function formatDate(dateStr) {
  const { year, month, day } = parseDate(dateStr);
  return `${day} de ${MONTHS[month-1]}`;
}
function getBadge(dateStr) {
  const days = getDaysUntil(dateStr);
  if (days === 0) return { text: '🎉 ¡HOY!', cls: 'badge-today' };
  if (days <= 7) return { text: `En ${days} días`, cls: 'badge-upcoming' };
  if (days <= 30) return { text: `En ${days} días`, cls: 'badge-upcoming' };
  return { text: formatDate(dateStr), cls: 'badge-past' };
}

// ─── ACCIONES SOBRE FIREBASE (ahora con autenticación) ───
function openAddModal() {
  if (currentUser.role !== 'admin') return;
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-date').value = '';
  populateSelects();
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-name').focus(), 100);
}
function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

async function saveBirthday() {
  if (currentUser.role !== 'admin') return;
  const name = document.getElementById('modal-name').value.trim();
  const date = document.getElementById('modal-date').value;
  const recaudadorId = document.getElementById('modal-recaudador').value;
  if (!name || !date) { alert('Por favor completá el nombre y la fecha.'); return; }
  try {
    await db.collection("birthdays").add({
      name, date,
      recaudador: recaudadorId || '',
      contributors: [],
      note: ''
    });
    await logAudit('crear cumpleaños', { nombre: name, fecha: date });
    closeModal();
  } catch (error) {
    alert('Error: ' + error.message);
  }
}

function deleteBirthday(id) {
  if (currentUser.role !== 'admin') return;
  if (!confirm('¿Eliminar este cumpleaños?')) return;
  const b = birthdays.find(b => b.id === id);
  db.collection("birthdays").doc(id).delete()
    .then(() => logAudit('eliminar cumpleaños', { nombre: b?.name, id }))
    .catch(error => alert('Error: ' + error.message));
}

async function saveParent() {
  if (currentUser.role !== 'admin') return;
  const name = document.getElementById('new-parent-name').value.trim();
  const email = document.getElementById('new-parent-email').value.trim(); // Necesitamos agregar campo email en el formulario
  const childName = document.getElementById('new-parent-child').value.trim();
  const contact = document.getElementById('new-parent-contact').value.trim();
  const password = document.getElementById('new-parent-password').value.trim() || '1234';
  const role = document.getElementById('new-parent-role').value;

  if (!name || !email) {
    alert('Nombre y email son obligatorios');
    return;
  }

  try {
    // 1. Crear usuario en Firebase Auth
    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
    const uid = userCredential.user.uid;

    // 2. Crear documento en Firestore (usamos el uid como ID opcionalmente)
    await db.collection("parents").add({
      name,
      email,
      childName: childName || '',
      contact: contact || '',
      password: password, // Guardamos la contraseña igual (aunque ahora está en Auth, la dejamos por si quieres verla)
      role,
      uid: uid // opcional, para referencia
    });

    // Limpiar formulario
    document.getElementById('new-parent-name').value = '';
    document.getElementById('new-parent-email').value = '';

async function toggleContributor(bdayId, parentId) {
  const bday = birthdays.find(b => b.id === bdayId);
  if (!bday) return;
  const contributors = bday.contributors || [];
  const isSelf = currentUser.id === parentId;
  const alreadyChecked = contributors.includes(parentId);
  if (currentUser.role !== 'admin' && (!isSelf || alreadyChecked)) return;
  const newContributors = alreadyChecked
    ? contributors.filter(id => id !== parentId)
    : [...contributors, parentId];
  try {
    await db.collection("birthdays").doc(bdayId).update({ contributors: newContributors });
    await logAudit(alreadyChecked ? 'desmarcar aporte' : 'marcar aporte', {
      cumpleaños: bday.name,
      padre: parents.find(p => p.id === parentId)?.name
    });
  } catch (error) {
    alert('Error: ' + error.message);
  }
}

// Archivos (igual que antes, pero ahora con autenticación)
function openUploadModal(bdayId) {
  document.getElementById('upload-bday-id').value = bdayId;
  document.getElementById('file-input').value = '';
  document.getElementById('upload-progress-container').style.display = 'none';
  document.getElementById('upload-file-modal').classList.add('open');
}
function closeUploadModal() {
  document.getElementById('upload-file-modal').classList.remove('open');
}
async function uploadFile() {
  const bdayId = document.getElementById('upload-bday-id').value;
  const fileInput = document.getElementById('file-input');
  if (!fileInput.files.length) { alert('Seleccioná un archivo'); return; }
  const file = fileInput.files[0];
  if (!file.type.startsWith('image/') && file.type !== 'application/pdf') {
    alert('Solo se permiten imágenes o PDF');
    return;
  }
  const bday = birthdays.find(b => b.id === bdayId);
  const fileName = `${Date.now()}_${file.name}`;
  const storageRef = storage.ref(`cumples/${bdayId}/${fileName}`);
  const uploadTask = storageRef.put(file);

  const progressContainer = document.getElementById('upload-progress-container');
  const progressBar = document.getElementById('upload-progress-bar');
  progressContainer.style.display = 'block';
  progressBar.style.width = '0%';

  uploadTask.on('state_changed',
    (snapshot) => {
      const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
      progressBar.style.width = progress + '%';
    },
    (error) => {
      alert('Error al subir: ' + error.message);
      progressContainer.style.display = 'none';
    },
    async () => {
      const url = await uploadTask.snapshot.ref.getDownloadURL();
      try {
        await db.collection('birthday_files').add({
          birthdayId: bdayId,
          fileName: file.name,
          fileType: file.type,
          fileSize: file.size,
          url: url,
          uploadedBy: currentUser.id,
          uploadedByName: currentUser.name,
          uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await logAudit('subir archivo', {
          cumpleaños: bday?.name,
          archivo: file.name
        });
        closeUploadModal();
      } catch (error) {
        alert('Error al guardar referencia: ' + error.message);
      }
    }
  );
}

async function deleteFile(fileId, bdayId) {
  if (currentUser.role !== 'admin') return;
  if (!confirm('¿Eliminar este archivo?')) return;
  try {
    const fileDoc = await db.collection('birthday_files').doc(fileId).get();
    if (fileDoc.exists) {
      const fileData = fileDoc.data();
      const fileRef = storage.refFromURL(fileData.url);
      await fileRef.delete();
      await db.collection('birthday_files').doc(fileId).delete();
      await logAudit('eliminar archivo', { archivo: fileData.fileName });
    }
  } catch (error) {
    alert('Error al eliminar: ' + error.message);
  }
}

// Share status (igual que antes)
function shareStatus(bdayId) {
  const b = birthdays.find(b=>b.id===bdayId);
  if (!b) return;
  const rec = b.recaudador ? (parents.find(p=>p.id===b.recaudador)?.name || '—') : 'Sin asignar';
  const checked = (b.contributors||[]).map(id => parents.find(p=>p.id===id)?.name || '').filter(Boolean);
  const unchecked = parents.filter(p=>!(b.contributors||[]).includes(p.id)).map(p=>p.name);
  let txt = `🎂 Cumpleaños de *${b.name}* (${formatDate(b.date)})\n`;
  txt += `🙋 Recaudador/a: *${rec}*\n\n`;
  txt += `✅ Aportaron (${checked.length}):\n${checked.map(n=>'  ✓ '+n).join('\n') || '  —'}\n\n`;
  txt += `⏳ Pendientes (${unchecked.length}):\n${unchecked.map(n=>'  · '+n).join('\n') || '  —'}`;
  if (b.note) txt += `\n\n📝 ${b.note}`;
  navigator.clipboard.writeText(txt).then(()=>alert('¡Copiado! Podés pegarlo en WhatsApp 📋')).catch(()=>prompt('Copia este texto:', txt));
}

function exportData() {
  const localData = { groupName: localStorage.getItem('groupName') || 'Mi Grupo Escolar' };
  const blob = new Blob([JSON.stringify(localData, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cumples-config.json';
  a.click();
}
function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const localData = JSON.parse(e.target.result);
      if (localData.groupName) {
        localStorage.setItem('groupName', localData.groupName);
        updateGroupName();
      }
      alert('Configuración importada.');
    } catch(err) { alert('Error al leer el archivo.'); }
  };
  reader.readAsText(file);
  input.value = '';
}
function clearAllData() {
  if (!confirm('⚠️ ¿Borrar TODOS los datos de la nube? Esta acción no se puede deshacer.')) return;
  Promise.all([
    ...parents.map(p => db.collection("parents").doc(p.id).delete()),
    ...birthdays.map(b => db.collection("birthdays").doc(b.id).delete())
  ]).then(() => alert('Datos eliminados.'))
    .catch(error => alert('Error: ' + error.message));
}

function openAddUserModal() {
  if (currentUser.role !== 'admin') return;
  document.getElementById('new-user-name').value = '';
  document.getElementById('new-user-email').value = ''; // Agregar campo email en el modal
  document.getElementById('new-user-password').value = '1234';
  document.getElementById('new-user-role').value = 'user';
  document.getElementById('new-user-child').value = '';
  document.getElementById('new-user-contact').value = '';
  document.getElementById('add-user-modal').classList.add('open');
}
function closeAddUserModal() { document.getElementById('add-user-modal').classList.remove('open'); }

async function saveUser() {
  const name = document.getElementById('new-user-name').value.trim();
  const email = document.getElementById('new-user-email').value.trim();
  const password = document.getElementById('new-user-password').value.trim() || '1234';
  const role = document.getElementById('new-user-role').value;
  const childName = document.getElementById('new-user-child').value.trim();
  const contact = document.getElementById('new-user-contact').value.trim();

  if (!name || !email) {
    alert('Nombre y email son obligatorios');
    return;
  }

  try {
    // Crear en Auth
    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
    const uid = userCredential.user.uid;

    // Crear en Firestore
    await db.collection("parents").add({
      name,
      email,
      password,
      role,
      childName: childName || '',
      contact: contact || '',
      uid
    });

    logAudit('crear usuario', { nombre: name, email, role });
    closeAddUserModal();
  } catch (error) {
    alert('Error al crear usuario: ' + error.message);
  }
}

function closeEditUserModal() { document.getElementById('edit-user-modal').classList.remove('open'); }

async function updateUser() {
  const id = document.getElementById('edit-user-id').value;
  const name = document.getElementById('edit-user-name').value.trim();
  const email = document.getElementById('edit-user-email').value.trim();
  const password = document.getElementById('edit-user-password').value.trim();
  const role = document.getElementById('edit-user-role').value;
  const childName = document.getElementById('edit-user-child').value.trim();
  const contact = document.getElementById('edit-user-contact').value.trim();

  if (!name || !email) {
    alert('Nombre y email son obligatorios');
    return;
  }

  try {
    // Actualizar Firestore
    await db.collection("parents").doc(id).update({
      name,
      email,
      password, // Actualizamos la contraseña en Firestore (solo para referencia)
      role,
      childName: childName || '',
      contact: contact || ''
    });

    // No podemos actualizar la contraseña en Auth sin el UID. Si quieres, podrías implementar un cambio de contraseña.
    logAudit('editar usuario', { nombre: name, email, role });
    closeEditUserModal();
  } catch (error) {
    alert('Error al actualizar: ' + error.message);
  }
}

function deleteUserFromEdit() {
  const id = document.getElementById('edit-user-id').value;
  if (!confirm('¿Eliminar este usuario?')) return;
  // No podemos eliminar de Auth fácilmente. Lo hacemos solo de Firestore.
  db.collection("parents").doc(id).delete()
    .then(() => {
      logAudit('eliminar usuario', { id });
      closeEditUserModal();
    })
    .catch(error => alert('Error: ' + error.message));
}
